<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SeedLand Game</title>
  <link rel="stylesheet" href="game.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>

  <div class="game-container">

    <div class="top-bar">
      <button class="back-btn" onclick="window.location.href='index.html'">⬅ Volver</button>
      <div class="wallet">💎 Billetera</div>
    </div>

    <h1 class="title">SeedLand</h1>
    <p class="welcome-text" id="welcomeText">Cargando jugador...</p>

    <div class="plots-container">

      <div class="plot-box" id="plotBox">
        <div class="plot-visual" id="plotVisual">🟫</div>
        <button id="buyPlotBtn" class="game-btn">Comprar parcela</button>
      </div>

      <div class="plot-box" id="seedBox">
        <div class="plot-visual" id="seedVisual">🌰</div>
        <button id="buySeedBtn" class="game-btn" disabled>Comprar semilla</button>
      </div>

    </div>

    <p id="plotStatus" class="status-text"></p>

    <div class="bottom-menu">
      <div class="menu-item active">🌱<span>Parcela</span></div>
      <div class="menu-item">🔍<span>Buscar</span></div>
      <div class="menu-item">🏪<span>Market</span></div>
      <div class="menu-item">🎯<span>Misión</span></div>
      <div class="menu-item">💰<span>Billetera</span></div>
    </div>

  </div>

  <script src="game.js"></script>
</body>
</html>
